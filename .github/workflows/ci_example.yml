name: Understand-Anything CI Check

on:
  pull_request:
    branches:
      - main

jobs:
  ua-ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate PR Diff
        id: pr_diff
        run: |
          git diff origin/main...HEAD > pr.diff

      - name: Run Understand-Anything CI Check
        env:
          UA_LICENSE_KEY: ${{ secrets.UA_TEAM_LICENSE_KEY }}
        run: |
          # Run the Understand-Anything CI wrapper to enforce branch protection
          # The wrapper will read UA_LICENSE_KEY, load the knowledge graph, parse pr.diff,
          # and fail the CI build (exit 1) if the backend detects a High-Risk architectural change.
          
          npx ua-ci --pr-diff=pr.diff
